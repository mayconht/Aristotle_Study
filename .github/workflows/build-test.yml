name: Build, Test and Analyze
# TODO: Split this workflow into multiple workflows 

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test-analyze:
    name: Build, Test and Analyze
    runs-on: ubuntu-latest
    
    env:
      CI: true
    
    steps:
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'zulu'
        
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 9.0.x
    
    - name: Cache SonarCloud packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar
    
    - name: Install SonarCloud scanner and dotnet-coverage
      run: |
        dotnet tool install --global dotnet-sonarscanner
        dotnet tool install --global dotnet-coverage
    
    - name: Begin SonarCloud Analysis
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        dotnet sonarscanner begin \
          /k:"mayconht_Aristotle_Study" \
          /o:"personalprojcts" \
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.cs.opencover.reportsPaths="coverage.opencover.xml" \
          /d:sonar.coverage.exclusions="**/Program.cs,**/Migrations/**/*.cs,**/*Tests.cs,**/obj/**/*.cs"
    
    - name: Restore Dependencies
      run: dotnet restore Aristotle_Study.sln
    
    - name: Build Solution
      run: dotnet build Aristotle_Study.sln --configuration Release --no-restore
    
    - name: Run Tests with Coverage Collection
      run: dotnet-coverage collect "dotnet test Aristotle_Study.sln --configuration Release --no-build" -f opencover -o "coverage.opencover.xml"
    
    - name: End SonarCloud Analysis
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
    
    - name: Generate Coverage Report
      uses: danielpalme/ReportGenerator-GitHub-Action@5.2.0
      with:
        reports: 'coverage.opencover.xml'
        targetdir: './coveragereport'
        reporttypes: 'HtmlInline;Cobertura'
    
    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coveragereport
    
    - name: Publish Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          Aristotle_Project/bin/Release/net9.0/
          Tests/bin/Release/net9.0/
