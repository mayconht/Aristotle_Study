name: Build, Test and Analyze

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-analyze:
    name: Build, Test and Analyze
    runs-on: ubuntu-latest
    
    env:
      CI: true
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore Aristotle_Study.sln
    
    - name: Build with dotnet
      run: dotnet build Aristotle_Study.sln --configuration Release --no-restore
    
    - name: Test with coverage
      run: dotnet test Aristotle_Study.sln --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --settings ./coverlet.runsettings
    
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=mayconht_Aristotle_Study
          -Dsonar.organization=personalprojcts
          -Dsonar.cs.opencover.reportsPaths=**/coverage.opencover.xml
