name: .NET Build and Test
 
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore dependencies
        run: dotnet restore Aristotle_Study.sln
      - name: Build
        run: dotnet build Aristotle_Study.sln --no-restore --configuration Release
      - name: Publish test build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-build-output
          path: |
            Tests/bin/Release/net9.0/

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Download test build artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-build-output
      - name: Restore dependencies
        run: dotnet restore Aristotle_Study.sln
      - name: Test
        run: dotnet test Tests/Aristotle.UnitTests.csproj --no-build --configuration Release --verbosity normal
